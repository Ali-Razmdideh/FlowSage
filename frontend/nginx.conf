server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: let React Router handle client-side paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mirrors vite.config.ts's dev proxy so the same VITE_API_BASE_URL=/api
    # works in both dev and this production image.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (GET /api/simulations/{id}/stream) needs an unbuffered, long-lived
        # connection -- default proxy buffering would hold the stream open.
        proxy_buffering off;
        proxy_read_timeout 1h;
    }
}
