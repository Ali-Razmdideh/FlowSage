name: flowsage

services:
  neo4j:
    image: neo4j:5.24-community
    ports:
      - "7474:7474" # browser UI
      - "7687:7687" # bolt
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-flowsage_dev}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-flowsage}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-flowsage_dev}"
      POSTGRES_DB: "${POSTGRES_DB:-flowsage}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowsage}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment: &backend_env
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-flowsage}:${POSTGRES_PASSWORD:-flowsage_dev}@postgres:5432/${POSTGRES_DB:-flowsage}"
      REDIS_URL: "redis://redis:6379/0"
      UPLOAD_DIR: /data/uploads
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-flowsage_dev}"
      EVENTS_API_KEY: "${EVENTS_API_KEY:-dev-events-api-key-change-me-before-deploying}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me-before-deploying-32bytes}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["/workspace/.venv/bin/flowsage-worker"]
    environment: *backend_env
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
  uploads_data:
